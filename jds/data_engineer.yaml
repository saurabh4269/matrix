# jds/data_engineer.yaml
#
# A second JD config to prove the YAML-driven architecture is real.
# Hypothetical role: Senior Data Engineer at the same Series-A Indian startup.
# Different vocabularies, different anti-patterns, different weights.
#
# Same Python code as ai_engineer.yaml. Swap the file, get a different
# ranking out of the same 100,000 candidates.

name: data_engineer
display_name: "Senior Data Engineer"

digest:
  role: "Senior Data Engineer."
  location: "Bangalore, Pune, or Hyderabad. Hybrid."
  experience: "Five to nine years."
  style: "Pipelines and platforms. Not application code."
  avoid:
    - "ML-only careers without warehouse / pipeline depth."
    - "Consulting-only careers."
    - "Pure ETL-tool-clickers with no scripting."

jd_text: |
  Senior Data Engineer, Founding Data Team at a Series A AI-native talent
  intelligence platform. Bangalore, Pune, or Hyderabad. Hybrid. 5-9 years.

  We need:
    - Production experience with Spark / Flink / Kafka at scale, ideally
      300+ million rows per day. Not just "I used Spark in a tutorial."
    - Production experience with a modern warehouse: Snowflake, BigQuery,
      Redshift, or Databricks. Stronger preference for ones with deep
      partitioning / clustering / vacuum experience.
    - Workflow orchestration: Airflow, Dagster, or Prefect, with on-call
      experience for data quality and pipeline failures.
    - Strong Python AND SQL. dbt is a plus but not required.
    - Hands-on with data modelling — star / snowflake schemas, slowly-
      changing dimensions, partition strategies, materialised view design.

  Nice to have:
    - Streaming experience (Kafka Streams, Flink).
    - Data lake formats (Iceberg, Delta Lake, Hudi).
    - Some exposure to ML feature stores (Feast, Tecton).

  Avoid: consulting-only careers, candidates whose entire data experience
  is one BI tool (Looker / Tableau without underlying pipeline work), and
  candidates whose recent work has been only ML model training without
  any underlying data infrastructure.

  The hire will own the warehouse + the pipelines that feed every team:
  candidate ranking, growth analytics, finance reporting. As we grow from
  4 engineers to 12, the warehouse and pipelines are the foundation.

