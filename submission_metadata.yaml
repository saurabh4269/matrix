ai_usage_summary: |
  Used Claude for design discussion, code review, and refining the SNR
  architecture and the six-act sandbox journey. No candidate data was fed to
  any LLM during ranking; reasoning generation is pure deterministic
  templating from structured probe evidence (no LLM in the runtime path).

methodology_summary: |
  Treats the JD as the algorithm: each JD requirement maps to a probe over
  the candidate schema. Probes are tagged High-SNR / Medium-SNR / Low-SNR /
  Anti-SNR and weighted by class; behavioural signals are a multiplicative
  modifier. Six deterministic structural-impossibility rules quarantine
  honeypots. Top 20 are refined via pairwise comparison against JD-priority
  tiebreakers because NDCG@10 (50% of the composite score) is a pairwise
  problem. Reasoning is composed from the top contributing probes per
  candidate using six templates per rank band with deterministic seeding,
  no LLM at runtime, so Stage-4 hallucination is impossible by construction.
  Runs in ~230s on CPU.

